<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimarket POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <link href="css/login.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
  <div class="wrapper">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon"><i class="fas fa-store"></i></div>
        <div class="brand-text">
          <h4>Minimarket</h4>
          <small>Sistema de Gestión</small>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Colapsar menú">
          <i class="fas fa-bars"></i>
        </button>
      </div>

      <ul class="sidebar-nav">
        <li class="sidebar-section">Principal</li>
        <li><a class="sidebar-link" data-route="dashboard" href="#/dashboard"><span class="link-icon"><i class="fas fa-chart-pie"></i></span><span class="link-text">Dashboard</span></a></li>

        <li><button class="sidebar-section-link" data-section="gestion">
          <span>Gestión</span>
          <i class="fas fa-chevron-right sec-chevron"></i>
        </button></li>
        <div class="sidebar-group" id="group-gestion">
          <li><a class="sidebar-link" data-route="productos" href="#/productos"><span class="link-icon"><i class="fas fa-box"></i></span><span class="link-text">Productos</span></a></li>
          <li><a class="sidebar-link" data-route="categorias" href="#/categorias"><span class="link-icon"><i class="fas fa-tags"></i></span><span class="link-text">Categorías</span></a></li>
          <li class="nav-admin-only"><a class="sidebar-link" data-route="kardex" href="#/kardex"><span class="link-icon"><i class="fas fa-book"></i></span><span class="link-text">Kardex</span></a></li>
          <li><a class="sidebar-link" data-route="transferencias" href="#/transferencias"><span class="link-icon"><i class="fas fa-arrow-right-arrow-left"></i></span><span class="link-text">Transferencias</span></a></li>
          <li><a class="sidebar-link" data-route="vencimientos" href="#/vencimientos"><span class="link-icon"><i class="fas fa-clock"></i></span><span class="link-text">Vencimientos</span></a></li>
          <li class="nav-admin-only"><a class="sidebar-link" data-route="valoracion" href="#/valoracion"><span class="link-icon"><i class="fas fa-dollar-sign"></i></span><span class="link-text">Valoración</span></a></li>
        </div>

        <li><button class="sidebar-section-link" data-section="ventas">
          <span>Ventas</span>
          <i class="fas fa-chevron-right sec-chevron"></i>
        </button></li>
        <div class="sidebar-group" id="group-ventas">
          <li><a class="sidebar-link" data-route="ventas" href="#/ventas"><span class="link-icon"><i class="fas fa-cart-shopping"></i></span><span class="link-text">Punto de Venta</span></a></li>
          <li><a class="sidebar-link" data-route="ventas-historial" href="#/ventas-historial"><span class="link-icon"><i class="fas fa-receipt"></i></span><span class="link-text">Historial Ventas</span></a></li>
          <li><a class="sidebar-link" data-route="cajas" href="#/cajas"><span class="link-icon"><i class="fas fa-cash-register"></i></span><span class="link-text">Cajas</span></a></li>
        </div>

        <li class="nav-admin-only"><button class="sidebar-section-link" data-section="admin">
          <span>Administración</span>
          <i class="fas fa-chevron-right sec-chevron"></i>
        </button></li>
        <div class="sidebar-group nav-admin-only" id="group-admin">
          <li><a class="sidebar-link" data-route="compras" href="#/compras"><span class="link-icon"><i class="fas fa-truck"></i></span><span class="link-text">Compras</span></a></li>
          <li><a class="sidebar-link" data-route="proveedores" href="#/proveedores"><span class="link-icon"><i class="fas fa-truck-field"></i></span><span class="link-text">Proveedores</span></a></li>
          <li><a class="sidebar-link" data-route="reportes" href="#/reportes"><span class="link-icon"><i class="fas fa-chart-line"></i></span><span class="link-text">Reportes</span></a></li>
          <li><a class="sidebar-link" data-route="usuarios" href="#/usuarios"><span class="link-icon"><i class="fas fa-users"></i></span><span class="link-text">Usuarios</span></a></li>
          <li><a class="sidebar-link" data-route="configuracion" href="#/configuracion"><span class="link-icon"><i class="fas fa-cog"></i></span><span class="link-text">Configuración</span></a></li>
        </div>
      </ul>

      <div class="sidebar-theme">
        <button class="theme-toggle" id="themeToggle">
          <i class="fas fa-moon"></i>
          <span>Modo Oscuro</span>
        </button>
      </div>

      <div class="sidebar-logout">
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Cerrar Sesión</span>
        </button>
      </div>

      <div class="sidebar-user">
        <div class="user-avatar" id="navUserAvatar">U</div>
        <div class="user-info">
          <div class="user-name" id="nav-user-name">Usuario</div>
          <small class="user-role" id="nav-user-role">Rol</small>
        </div>
      </div>
    </nav>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <button class="mobile-hamburger" id="mobileHamburger" title="Abrir menú">
      <i class="fas fa-bars"></i>
    </button>

    <main class="main-content">
      <header class="topbar-header" id="topbarHeader" style="display: none;">
        <div class="topbar-left">
          <div class="topbar-branch-wrapper" id="topbarBranchWrapper">
            <i class="fas fa-store branch-icon-header"></i>
            <select id="topbarBranchSelector" class="form-select form-select-sm topbar-branch-select" title="Seleccionar Sucursal">
              <option value="">Cargando sucursales...</option>
            </select>
          </div>
        </div>
        <div class="topbar-right">
          <span id="topbarBranchBadge" class="badge bg-primary-subtle text-primary fw-bold"></span>
        </div>
      </header>
      <div id="app-content">
        <div class="loading-page">
          <div class="spinner-modern spinner-modern-lg"></div>
          <span>Cargando...</span>
        </div>
      </div>
    </main>

  </div>

  <div id="toast-container" class="toast-container"></div>
  <div id="modal-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/password-reset.js"></script>
  <script src="js/pages/reset-password.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/ventas.js"></script>
  <script src="js/pages/historial.js"></script>
  <script src="js/pages/comprobante.js"></script>
  <script src="js/pages/cajas.js"></script>
  <script src="js/pages/reportes.js"></script>
  <script src="js/pages/usuarios.js"></script>
  <script src="js/pages/configuracion.js"></script>
  <script src="js/pages/compras.js"></script>
  <script src="js/pages/proveedores.js"></script>
  <script src="js/pages/productos.js"></script>
  <script src="js/pages/categorias.js"></script>
  <script src="js/pages/kardex.js"></script>
  <script src="js/pages/transferencias.js"></script>
  <script src="js/pages/vencimientos.js"></script>
  <script src="js/pages/valoracion.js"></script>
</body>
</html>
